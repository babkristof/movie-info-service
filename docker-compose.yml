version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: movie-info-mysql
    environment:
      MYSQL_DATABASE: movie_info
      MYSQL_USER: movie_user
      MYSQL_PASSWORD: movie_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "movie_user", "-pmovie_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: movie-info-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
